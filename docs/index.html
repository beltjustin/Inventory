<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1f4e5f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Pantry Inventory</title>
<style>
:root{--bg:#0f1417;--card:#1a2228;--card2:#222d35;--ink:#e8eef0;--muted:#8aa0ab;
--accent:#3fa7c4;--green:#6fbf73;--yellow:#e8c24a;--red:#e0735a;--line:#2c3941;}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
body{padding:16px 16px calc(90px + env(safe-area-inset-bottom));max-width:760px;margin:0 auto}
h1{font-size:21px;margin:0}
.sub{color:var(--muted);font-size:12px;margin:2px 0 14px}
.placesel{width:100%;background:var(--card2);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px;font-weight:600;margin-bottom:12px}
#banner{background:#3a2a1a;border:1px solid #7a5a2a;color:#f0d9b0;padding:10px 12px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}
.search{width:100%;padding:15px 16px;font-size:17px;background:var(--card);border:1px solid var(--line);border-radius:12px;color:var(--ink)}
.search:focus{outline:none;border-color:var(--accent)}
#answer{min-height:22px;margin:8px 2px 14px;font-size:14px}
.have{color:var(--green);font-weight:600}.havent{color:var(--red);font-weight:600}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center}
.card .n{font-size:22px;font-weight:700}.card .l{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.03em}
.segbar{display:flex;gap:6px;margin-bottom:12px}
.seg{flex:1;text-align:center;padding:10px 4px;border-radius:10px;background:var(--card);border:1px solid var(--line);color:var(--muted);font-size:13px;cursor:pointer;font-weight:600}
.seg.active{background:var(--accent);color:#06222b;border-color:var(--accent)}
.tabs{display:flex;gap:8px;margin:0 0 12px}
.tab{flex:1;text-align:center;padding:9px;border-radius:9px;background:var(--card);border:1px solid var(--line);color:var(--muted);font-size:14px;cursor:pointer}
.tab.active{background:var(--card2);color:var(--ink);border-color:var(--accent)}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
select{flex:1;min-width:140px;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px;font-size:13px}
.item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.item .thumb{width:42px;height:42px;border-radius:8px;object-fit:cover;flex:0 0 auto;background:var(--card2)}
.item .body{flex:1;min-width:0}
.item .nm{font-weight:600}
.item .meta{color:var(--muted);font-size:12.5px;margin-top:1px}
.loctag{display:inline-block;font-size:11px;font-weight:600;padding:1px 7px;border-radius:6px;margin-right:6px}
.lt-Pantry{background:rgba(63,167,196,.16);color:var(--accent)}
.lt-Fridge{background:rgba(111,191,115,.16);color:var(--green)}
.lt-Freezer{background:rgba(140,170,230,.18);color:#9fb6f0}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}
.d-red{background:rgba(224,115,90,.18);color:var(--red)}
.d-yellow{background:rgba(232,194,74,.16);color:var(--yellow)}
.d-green{background:rgba(111,191,115,.15);color:var(--green)}
.d-gray{background:rgba(138,160,171,.15);color:var(--muted)}
.rowbtns{display:flex;gap:6px;flex:0 0 auto}
.ib{border:1px solid var(--line);background:var(--card2);color:var(--ink);border-radius:8px;padding:7px 9px;font-size:12px;cursor:pointer}
.ib.use{border-color:#3a5a3a;color:var(--green)}.ib.del{border-color:#5a3a3a;color:var(--red)}
.empty{color:var(--muted);text-align:center;padding:30px 10px}
#fab{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;background:var(--accent);color:#06222b;border:none;font-size:30px;line-height:1;box-shadow:0 6px 18px rgba(0,0,0,.4);cursor:pointer;z-index:20}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center;z-index:30}
.modal.open{display:flex}
.sheet{background:var(--bg);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:760px;max-height:92vh;overflow:auto;padding:18px 18px calc(24px + env(safe-area-inset-bottom))}
.sheet h2{margin:2px 0 14px;font-size:18px}
label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.03em}
input,textarea,.sheet select{width:100%;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:11px;font-size:15px;font-family:inherit}
.two{display:flex;gap:10px}.two>div{flex:1}
.savebtns{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;padding:13px;border-radius:11px;border:none;font-size:15px;font-weight:600;cursor:pointer}
.btn.primary{background:var(--accent);color:#06222b}
.btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
#photoPrev{max-width:90px;border-radius:9px;margin-top:8px;display:none}
.hintrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
a.link{color:var(--accent);font-size:12px;text-decoration:none;cursor:pointer}
/* action sheet menu */
.menu{display:flex;flex-direction:column;gap:10px}
.menu button{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:15px;font-size:16px;cursor:pointer}
.menu button .ic{font-size:22px}
.menu button .d{display:block;font-size:12px;color:var(--muted);font-weight:400}
/* scan review */
.scanrow{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.scanrow input[type=checkbox]{width:18px;height:18px;margin-top:3px;accent-color:var(--accent);flex:0 0 auto}
.scanrow .info{flex:1;min-width:0}
.scanrow .t{font-weight:600}
.scanrow .s{font-size:12.5px;color:var(--muted)}
.scanhdr{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:16px 0 8px}
.spinner{display:flex;flex-direction:column;align-items:center;gap:14px;padding:34px 10px;color:var(--muted)}
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.stage{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.sthumb{position:relative;width:72px;height:72px}
.sthumb img{width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
.srm{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;border:none;background:var(--red);color:#fff;font-size:11px;line-height:1;cursor:pointer}
.btn:disabled{opacity:.45;cursor:default}
</style>
</head>
<body>
<div class="hintrow">
  <div><h1>🧺 Pantry Inventory</h1><div class="sub" id="sub">Loading…</div></div>
  <a class="link" id="reload">↻ Refresh</a>
</div>
<select id="placeSel" class="placesel" title="Which inventory"></select>
<div id="banner"></div>

<input id="q" class="search" placeholder="Do I have… ?  (taco shells, cholula, beans…)" autocomplete="off">
<div id="answer"></div>

<div class="cards" id="cards"></div>

<div class="segbar" id="locbar">
  <div class="seg active" data-loc="">All</div>
  <div class="seg" data-loc="Pantry">🥫 Pantry</div>
  <div class="seg" data-loc="Fridge">🧊 Fridge</div>
  <div class="seg" data-loc="Freezer">❄️ Freezer</div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="all">All items</div>
  <div class="tab" data-tab="expiring">Expiring soon</div>
</div>

<div class="filters">
  <select id="fcat"></select>
  <select id="fstatus"></select>
</div>

<div id="list"></div>

<button id="fab" title="Add">+</button>

<!-- + action menu -->
<div class="modal" id="menuModal">
  <div class="sheet">
    <h2>Add to pantry</h2>
    <div class="menu">
      <button id="mManual"><span class="ic">✏️</span><span>Add manually<span class="d">Type in one item</span></span></button>
      <button id="mReceipt"><span class="ic">🧾</span><span>Scan a receipt<span class="d">Photo → items added automatically</span></span></button>
      <button id="mReconcile"><span class="ic">📸</span><span>Reconcile a shelf<span class="d">Photos or a video → update what's there now</span></span></button>
    </div>
    <div class="savebtns"><button class="btn ghost" id="menuCancel">Cancel</button></div>
  </div>
</div>

<!-- add / edit form -->
<div class="modal" id="modal">
  <div class="sheet">
    <h2 id="mTitle">Add item</h2>
    <input type="hidden" id="fId">
    <label>Item</label><input id="fItem" placeholder="e.g. Taco shells">
    <div class="two">
      <div><label>Quantity</label><input id="fQty" type="number" step="any" value="1"></div>
      <div><label>Unit</label><input id="fUnit" placeholder="box, can, bag…"></div>
    </div>
    <label>Category</label><input id="fCat" list="catlist" placeholder="Snacks, Canned Goods…">
    <datalist id="catlist"></datalist>
    <label>List / place</label><input id="fPlace" list="placelist" placeholder="Home, RV, Lake House…">
    <datalist id="placelist"></datalist>
    <div class="two">
      <div><label>Location</label><select id="fLoc"><option>Pantry</option><option>Fridge</option><option>Freezer</option></select></div>
      <div><label>Status</label><select id="fStatus"><option>In Stock</option><option>Low</option><option>Out</option></select></div>
    </div>
    <label>Expiration date</label><input id="fExp" type="date">
    <label>Notes</label><textarea id="fNotes" rows="2"></textarea>
    <label>Photo (optional)</label>
    <input id="fPhoto" type="file" accept="image/*" capture="environment">
    <img id="photoPrev">
    <div class="savebtns">
      <button class="btn ghost" id="cancelBtn">Cancel</button>
      <button class="btn primary" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<!-- scan / reconcile review -->
<div class="modal" id="scanModal">
  <div class="sheet">
    <h2 id="scanTitle">Scan</h2>
    <div id="scanBody"></div>
  </div>
</div>

<!-- partial use -->
<div class="modal" id="useModal">
  <div class="sheet">
    <h2 id="useTitle">Use item</h2>
    <p class="sub" id="useSub" style="margin:0 0 10px"></p>
    <label>Amount used</label>
    <div class="two">
      <div><input id="useQty" type="number" step="any" min="0"></div>
      <div style="display:flex;align-items:center;color:var(--muted)" id="useUnitLbl"></div>
    </div>
    <p style="color:var(--muted);font-size:12px;margin-top:8px">Using the full amount removes it from your pantry. Using less just lowers the count. Either way it's logged to your usage history.</p>
    <div class="savebtns">
      <button class="btn ghost" id="useCancel">Cancel</button>
      <button class="btn primary" id="useApply">Log usage</button>
    </div>
  </div>
</div>

<input type="file" id="scanFile" accept="image/*,video/*" multiple style="display:none">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
